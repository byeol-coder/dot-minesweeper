<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#060610;--surface:#0d0d1f;--raise:#171730;--lift:#1f1f40;
  --rule:#282850;--rule2:#383870;--text:#f0eeff;--muted:#8888aa;--faint:#444466;
  --dot:#7c6ff7;--dot-lt:#a29bfe;--dot-xlt:#c4bfff;
}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.skip{position:absolute;top:-100px;left:8px;background:var(--dot);color:#fff;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:700;z-index:9999}
.skip:focus{top:8px}
.nav{position:sticky;top:0;z-index:100;background:rgba(6,6,16,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--rule);padding:0 clamp(16px,4vw,56px);height:54px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:11px}
.nav-mark{width:30px;height:30px;background:var(--dot);border-radius:8px;display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:6px;flex-shrink:0}
.nav-mark span{background:rgba(255,255,255,.9);border-radius:50%}
.nav-wordmark{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;letter-spacing:-.3px;color:var(--text)}
.nav-wordmark em{font-style:normal;color:var(--dot-lt)}
.nav-wordmark .sep{color:var(--faint);margin:0 6px;font-weight:400}
.nav-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--faint);border:1px solid var(--rule);padding:3px 10px;border-radius:99px}
.hub-header{padding:48px clamp(16px,4vw,56px) 0}
.hub-eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--dot);margin-bottom:14px}
.hub-eyebrow::before{content:'';width:20px;height:1px;background:var(--dot)}
.hub-title{font-family:'Space Grotesk',sans-serif;font-size:clamp(26px,4vw,42px);font-weight:700;letter-spacing:-.03em;line-height:1.15;margin-bottom:10px}
.hub-title span{color:var(--dot-lt)}
.hub-desc{font-size:14px;color:var(--muted);line-height:1.75;max-width:520px}
.filter-wrap{padding:28px clamp(16px,4vw,56px) 0;display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.04em;padding:6px 16px;border-radius:99px;border:1px solid var(--rule);color:var(--muted);transition:all .15s;cursor:pointer;background:transparent;white-space:nowrap}
.filter-btn:hover{border-color:var(--dot);color:var(--dot-lt)}
.filter-btn.active{background:var(--dot);border-color:var(--dot);color:#fff}
.filter-btn:focus-visible{outline:2px solid var(--dot);outline-offset:2px}
.grid-wrap{padding:24px clamp(16px,4vw,56px) 64px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.card{display:block;background:var(--surface);border-radius:12px;overflow:hidden;border:1px solid var(--rule);transition:transform .25s ease,box-shadow .25s ease,border-color .2s;outline:none;cursor:pointer;position:relative}
.card:hover,.card:focus-visible{transform:translateY(-6px) scale(1.02);box-shadow:0 24px 64px rgba(0,0,0,.75),0 0 0 1px var(--dot);border-color:var(--dot)}
.card:focus-visible{box-shadow:0 0 0 3px var(--dot-lt)}
.card-thumb{position:relative;aspect-ratio:16/9;overflow:hidden;background:#0a0a14}
.card-thumb svg{display:block;width:100%;height:100%}
.card-hover-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(6,6,16,1) 0%,rgba(6,6,16,.65) 45%,rgba(6,6,16,.15) 100%);opacity:0;transition:opacity .22s;display:flex;flex-direction:column;justify-content:flex-end;padding:16px}
.card:hover .card-hover-overlay,.card:focus-visible .card-hover-overlay{opacity:1}
.hover-title{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:#fff;margin-bottom:6px;letter-spacing:-.2px}
.hover-desc{font-size:12px;color:rgba(255,255,255,.75);line-height:1.55;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hover-meta{display:flex;align-items:center;justify-content:space-between}
.hover-open{font-family:'DM Mono',monospace;font-size:10px;color:var(--dot-xlt);display:flex;align-items:center;gap:5px;font-weight:500}
.hover-tags{display:flex;gap:4px}
.hover-tag{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:4px;font-weight:500}
.card-info{padding:13px 15px 15px}
.card-title{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.site-footer{border-top:1px solid var(--rule);padding:24px clamp(16px,4vw,56px);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.footer-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--faint)}
@media(max-width:768px){.card-grid{grid-template-columns:repeat(2,1fr);gap:12px}}
@media(max-width:480px){.card-grid{grid-template-columns:1fr}}
</style>

const CATS = ['전체','접근성','게임','AI','교육'];
let activeCat = '전체';

function renderFilters(){
  const wrap = document.getElementById('filterWrap');
  wrap.innerHTML = '';
  CATS.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === activeCat ? ' active' : '');
    btn.textContent = cat;
    btn.setAttribute('role','tab');
    btn.setAttribute('aria-selected', cat === activeCat ? 'true' : 'false');
    btn.addEventListener('click', () => { activeCat = cat; renderFilters(); renderGrid(); });
    wrap.appendChild(btn);
  });
}

function renderGrid(){
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  const filtered = activeCat === '전체' ? PROJECTS : PROJECTS.filter(p => p.cat === activeCat);
  document.getElementById('navCount').textContent = filtered.length + ' projects';
  document.getElementById('footerCount').textContent = filtered.length + ' / ' + PROJECTS.length + ' 프로젝트';

  filtered.forEach(p => {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.setAttribute('aria-label', p.title + ' — ' + p.tagline + ' (새 탭에서 열립니다)');

    // Thumb
    const thumb = document.createElement('div');
    thumb.className = 'card-thumb';
    thumb.innerHTML = (THUMBS[p.id] || '') + '<div class="card-hover-overlay"></div>';

    // Hover overlay
    const overlay = thumb.querySelector('.card-hover-overlay');
    const htitle = document.createElement('div'); htitle.className = 'hover-title'; htitle.textContent = p.title;
    const hdesc = document.createElement('p'); hdesc.className = 'hover-desc'; hdesc.textContent = p.desc;
    const hmeta = document.createElement('div'); hmeta.className = 'hover-meta';
    const hopen = document.createElement('span'); hopen.className = 'hover-open'; hopen.textContent = '↗ 열기';
    const htags = document.createElement('div'); htags.className = 'hover-tags';
    p.tags.slice(0,2).forEach(t => {
      const c = BC[t] || '#888';
      const sp = document.createElement('span');
      sp.className = 'hover-tag';
      sp.style.cssText = 'background:' + c + '22;color:' + c + ';border:1px solid ' + c + '44';
      sp.textContent = t;
      htags.appendChild(sp);
    });
    hmeta.appendChild(htags); hmeta.appendChild(hopen);
    overlay.appendChild(htitle); overlay.appendChild(hdesc); overlay.appendChild(hmeta);

    // Card info
    const info = document.createElement('div'); info.className = 'card-info';
    const title = document.createElement('div'); title.className = 'card-title'; title.textContent = p.title;
    const sub = document.createElement('div'); sub.className = 'card-sub'; sub.textContent = p.tagline;
    info.appendChild(title); info.appendChild(sub);

    const sr = document.createElement('span'); sr.className = 'sr-only'; sr.textContent = '새 탭에서 열립니다.';

    a.appendChild(thumb); a.appendChild(info); a.appendChild(sr);
    grid.appendChild(a);
  });
}

renderFilters();
renderGrid();
</script>
</body>
</html>
